<head>

<title>Tetris</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0f0f1a;
  color: #fff;
  font-family: monospace;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 12px 8px;
  user-select: none;
  -webkit-user-select: none;
  touch-action: pan-y;
}
h1 {
  font-size: 22px;
  letter-spacing: 0.2em;
  margin-bottom: 10px;
  color: #00cfcf;
  text-shadow: 0 0 12px rgba(0,207,207,0.4);
}
#top-bar {
  display: flex;
  gap: 8px;
  width: 100%;
  max-width: 340px;
  margin-bottom: 8px;
}
.stat {
  background: #1a1a2e;
  border: 1px solid #2a2a4a;
  border-radius: 8px;
  padding: 6px 10px;
  flex: 1;
  text-align: center;
}
.stat-label { font-size: 9px; color: #666; letter-spacing: 0.1em; text-transform: uppercase; }
.stat-value { font-size: 18px; font-weight: bold; color: #fff; line-height: 1.3; }
#main-row {
  display: flex;
  gap: 8px;
  align-items: flex-start;
}
#board-wrap { position: relative; }
#tetris {
  display: block;
  border: 2px solid #333;
  border-radius: 4px;
  background: #0a0a14;
  touch-action: none;
}
#right-panel {
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: center;
}
.panel {
  background: #1a1a2e;
  border: 1px solid #2a2a4a;
  border-radius: 8px;
  padding: 8px 10px;
  text-align: center;
  width: 70px;
}
.panel-label { font-size: 9px; color: #666; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
#next-canvas {
  display: block;
  background: #0a0a14;
  border-radius: 4px;
}
#btn-pause {
  width: 64px;
  height: 40px;
  font-size: 18px;
  cursor: pointer;
  border-radius: 8px;
  border: 1px solid #333;
  background: #1a1a2e;
  color: #fff;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
#controls {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-top: 10px;
  width: 100%;
  max-width: 340px;
}
.ctrl-btn {
  height: 58px;
  font-size: 24px;
  cursor: pointer;
  border-radius: 10px;
  border: 1px solid #333;
  background: #1a1a2e;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  transition: background 0.08s, transform 0.08s;
}
.ctrl-btn:active { background: #0f0f14; transform: scale(0.93); }
#btn-drop {
  grid-column: span 2;
  height: 52px;
  font-size: 13px;
  letter-spacing: 0.05em;
}
#game-overlay {
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(10,10,20,0.88);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
  gap: 10px;
  /* overlayはタッチを通さない */
  touch-action: manipulation;
}
#overlay-title { font-size: 22px; font-weight: bold; letter-spacing: 0.1em; color: #00cfcf; }
#overlay-sub { font-size: 12px; color: #aaa; text-align: center; padding: 0 12px; }
#btn-overlay {
  margin-top: 4px;
  padding: 14px 36px;
  font-size: 16px;
  font-family: monospace;
  cursor: pointer;
  border-radius: 8px;
  border: 2px solid #00cfcf;
  background: rgba(0,207,207,0.15);
  color: #00cfcf;
  letter-spacing: 0.05em;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
#btn-overlay:active { background: rgba(0,207,207,0.3); }
.hidden { display: none !important; }
</style>
</head>
<body>
<h1>TETRIS</h1>

<div id="top-bar">
  <div class="stat"><div class="stat-label">スコア</div><div class="stat-value" id="score-val">0</div></div>
  <div class="stat"><div class="stat-label">レベル</div><div class="stat-value" id="level-val">1</div></div>
  <div class="stat"><div class="stat-label">ライン</div><div class="stat-value" id="lines-val">0</div></div>
</div>

<div id="main-row">
  <div id="board-wrap">
    <canvas id="tetris"></canvas>
    <div id="game-overlay">
      <div id="overlay-title">TETRIS</div>
      <div id="overlay-sub">スタートを押してください<br><br>PC: 矢印キー / スペース<br>スマホ: ボタン / ボード上スワイプ</div>
      <button id="btn-overlay">▶ スタート</button>
    </div>
  </div>
  <div id="right-panel">
    <div class="panel">
      <div class="panel-label">次</div>
      <canvas id="next-canvas" width="60" height="60"></canvas>
    </div>
    <button id="btn-pause">⏸</button>
  </div>
</div>

<div id="controls">
  <button class="ctrl-btn" id="btn-left">←</button>
  <button class="ctrl-btn" id="btn-rotate">↻</button>
  <button class="ctrl-btn" id="btn-right">→</button>
  <button class="ctrl-btn" id="btn-down">↓</button>
  <button class="ctrl-btn" id="btn-drop" style="grid-column:span 2;font-size:13px">ハードドロップ</button>
</div>

<script>
(function(){
  const COLS=10, ROWS=20;
  const canvas=document.getElementById('tetris');
  const ctx=canvas.getContext('2d');
  const nextCanvas=document.getElementById('next-canvas');
  const nctx=nextCanvas.getContext('2d');
  const overlay=document.getElementById('game-overlay');
  const overlayTitle=document.getElementById('overlay-title');
  const overlaySub=document.getElementById('overlay-sub');
  const btnOverlay=document.getElementById('btn-overlay');
  const scoreEl=document.getElementById('score-val');
  const levelEl=document.getElementById('level-val');
  const linesEl=document.getElementById('lines-val');
  const btnPause=document.getElementById('btn-pause');

  function calcCell(){
    const maxW=Math.min(window.innerWidth-100,240);
    return Math.floor(maxW/COLS);
  }
  let CELL=calcCell();
  function resizeCanvas(){
    CELL=calcCell();
    canvas.width=COLS*CELL;
    canvas.height=ROWS*CELL;
  }
  resizeCanvas();
  window.addEventListener('resize',()=>{resizeCanvas();drawBoard();});

  const PIECE_COLORS=[null,'#00cfcf','#cfcf00','#9f00cf','#00cf00','#cf0000','#0050cf','#cf6f00'];
  const SHAPES=[
    null,
    [[1,1,1,1]],
    [[2,2],[2,2]],
    [[0,3,0],[3,3,3]],
    [[0,4,4],[4,4,0]],
    [[5,5,0],[0,5,5]],
    [[6,0,0],[6,6,6]],
    [[0,0,7],[7,7,7]],
  ];

  let bag=[];
  function refillBag(){
    bag=[1,2,3,4,5,6,7];
    for(let i=bag.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [bag[i],bag[j]]=[bag[j],bag[i]];
    }
  }
  function nextFromBag(){
    if(!bag.length)refillBag();
    const id=bag.pop();
    const shape=SHAPES[id].map(r=>[...r]);
    return{id,shape,x:Math.floor((COLS-shape[0].length)/2),y:0};
  }

  let board,piece,nextPiece,score,level,lines,dropInterval,lastTime,rafId,dropCounter;
  let state='idle';

  const createBoard=()=>Array.from({length:ROWS},()=>new Array(COLS).fill(0));

  function rotate(shape){
    const rows=shape.length,cols=shape[0].length;
    const r=Array.from({length:cols},()=>new Array(rows).fill(0));
    for(let i=0;i<rows;i++)for(let j=0;j<cols;j++)r[j][rows-1-i]=shape[i][j];
    return r;
  }

  function valid(p,dx=0,dy=0,shape=p.shape){
    for(let r=0;r<shape.length;r++)
      for(let c=0;c<shape[r].length;c++)
        if(shape[r][c]){
          const nx=p.x+c+dx,ny=p.y+r+dy;
          if(nx<0||nx>=COLS||ny>=ROWS)return false;
          if(ny>=0&&board[ny][nx])return false;
        }
    return true;
  }

  function lockPiece(){
    piece.shape.forEach((row,r)=>row.forEach((v,c)=>{if(v&&piece.y+r>=0)board[piece.y+r][piece.x+c]=v;}));
    let cleared=0;
    for(let r=ROWS-1;r>=0;r--){
      if(board[r].every(v=>v)){board.splice(r,1);board.unshift(new Array(COLS).fill(0));cleared++;r++;}
    }
    if(cleared){
      const pts=[0,100,300,500,800];
      lines+=cleared;score+=(pts[cleared]||0)*level;
      level=Math.floor(lines/10)+1;
      dropInterval=Math.max(100,1000-(level-1)*90);
      scoreEl.textContent=score;levelEl.textContent=level;linesEl.textContent=lines;
    }
    piece=nextPiece;nextPiece=nextFromBag();
    if(!valid(piece)){gameOver();return;}
    drawNext();
  }

  function hardDrop(){
    while(valid(piece,0,1)){piece.y++;score+=2;}
    scoreEl.textContent=score;
    lockPiece();
  }

  function ghostY(){
    let gy=piece.y;
    while(valid(piece,0,gy-piece.y+1))gy++;
    return gy;
  }

  function drawCell(c,x,y,color,alpha=1){
    c.globalAlpha=alpha;
    c.fillStyle=color;
    c.fillRect(x*CELL+1,y*CELL+1,CELL-2,CELL-2);
    c.fillStyle='rgba(255,255,255,0.18)';
    c.fillRect(x*CELL+1,y*CELL+1,CELL-2,3);
    c.fillRect(x*CELL+1,y*CELL+1,3,CELL-2);
    c.fillStyle='rgba(0,0,0,0.3)';
    c.fillRect(x*CELL+1,y*CELL+CELL-4,CELL-2,3);
    c.fillRect(x*CELL+CELL-4,y*CELL+1,3,CELL-2);
    c.globalAlpha=1;
  }

  function drawBoard(){
    ctx.fillStyle='#0a0a14';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=0.5;
    for(let r=0;r<=ROWS;r++){ctx.beginPath();ctx.moveTo(0,r*CELL);ctx.lineTo(COLS*CELL,r*CELL);ctx.stroke();}
    for(let c=0;c<=COLS;c++){ctx.beginPath();ctx.moveTo(c*CELL,0);ctx.lineTo(c*CELL,ROWS*CELL);ctx.stroke();}
    board.forEach((row,r)=>row.forEach((v,c)=>{if(v)drawCell(ctx,c,r,PIECE_COLORS[v]);}));
    if(state==='playing'||state==='paused'){
      const gy=ghostY();
      piece.shape.forEach((row,r)=>row.forEach((v,c)=>{if(v&&gy+r>=0)drawCell(ctx,piece.x+c,gy+r,PIECE_COLORS[piece.id],0.22);}));
      piece.shape.forEach((row,r)=>row.forEach((v,c)=>{if(v&&piece.y+r>=0)drawCell(ctx,piece.x+c,piece.y+r,PIECE_COLORS[piece.id]);}));
    }
  }

  function drawNext(){
    nctx.fillStyle='#0a0a14';nctx.fillRect(0,0,60,60);
    const s=nextPiece.shape,nc=12;
    const ox=Math.floor((4-s[0].length)/2),oy=Math.floor((4-s.length)/2);
    s.forEach((row,r)=>row.forEach((v,c)=>{
      if(v){
        nctx.fillStyle=PIECE_COLORS[nextPiece.id];
        nctx.fillRect((ox+c)*nc+6+1,(oy+r)*nc+6+1,nc-2,nc-2);
        nctx.fillStyle='rgba(255,255,255,0.18)';
        nctx.fillRect((ox+c)*nc+6+1,(oy+r)*nc+6+1,nc-2,3);
        nctx.fillRect((ox+c)*nc+6+1,(oy+r)*nc+6+1,3,nc-2);
      }
    }));
  }

  function loop(ts=0){
    if(state!=='playing'){drawBoard();return;}
    const dt=ts-(lastTime||ts);lastTime=ts;
    dropCounter+=dt;
    if(dropCounter>=dropInterval){
      if(valid(piece,0,1))piece.y++;
      else lockPiece();
      dropCounter=0;
    }
    drawBoard();
    rafId=requestAnimationFrame(loop);
  }

  function startGame(){
    board=createBoard();score=0;level=1;lines=0;dropInterval=1000;dropCounter=0;lastTime=0;
    scoreEl.textContent=0;levelEl.textContent=1;linesEl.textContent=0;
    bag=[];refillBag();
    piece=nextFromBag();nextPiece=nextFromBag();
    drawNext();state='playing';
    overlay.classList.add('hidden');
    btnPause.textContent='⏸';
    cancelAnimationFrame(rafId);
    rafId=requestAnimationFrame(loop);
  }

  function pauseGame(){
    if(state==='playing'){
      state='paused';cancelAnimationFrame(rafId);
      overlay.classList.remove('hidden');
      overlayTitle.textContent='PAUSED';
      overlaySub.textContent='再開するには▶を押してください';
      btnOverlay.textContent='▶ 再開';
      btnPause.textContent='▶';
    }else if(state==='paused'){
      state='playing';overlay.classList.add('hidden');
      btnPause.textContent='⏸';lastTime=0;
      rafId=requestAnimationFrame(loop);
    }
  }

  function gameOver(){
    state='over';cancelAnimationFrame(rafId);
    overlay.classList.remove('hidden');
    overlayTitle.textContent='GAME OVER';
    overlaySub.textContent='スコア: '+score;
    btnOverlay.textContent='▶ もう一度';
    drawBoard();
  }

  function doRotate(){
    const rotated=rotate(piece.shape);
    for(const dx of[0,1,-1,2,-2]){
      if(valid(piece,dx,0,rotated)){piece.shape=rotated;piece.x+=dx;break;}
    }
  }

  // pointerdown のみで処理（click/touchend の二重発火を完全回避）
  function onTap(el, fn){
    el.addEventListener('pointerdown', function(e){
      e.preventDefault();
      fn();
    });
  }

  onTap(btnOverlay, ()=>{
    if(state==='idle'||state==='over') startGame();
    else pauseGame();
  });
  onTap(btnPause, pauseGame);
  onTap(document.getElementById('btn-rotate'), ()=>{ if(state!=='playing')return; doRotate(); drawBoard(); });

  // 長押し対応ボタン（pointerdown/up/cancel に統一）
  function repeatBtn(id, action, delay=110){
    const el=document.getElementById(id);
    let timer=null;
    function stop(){ if(timer){ clearInterval(timer); timer=null; } }
    function start(e){
      e.preventDefault();
      action();
      stop();
      timer=setInterval(action, delay);
    }
    el.addEventListener('pointerdown', start);
    el.addEventListener('pointerup', stop);
    el.addEventListener('pointercancel', stop);
    el.addEventListener('pointerleave', stop);
  }

  repeatBtn('btn-left',  ()=>{ if(state!=='playing')return; if(valid(piece,-1,0))piece.x--; drawBoard(); });
  repeatBtn('btn-right', ()=>{ if(state!=='playing')return; if(valid(piece,1,0))piece.x++;  drawBoard(); });
  repeatBtn('btn-down',  ()=>{
    if(state!=='playing')return;
    if(valid(piece,0,1)){piece.y++;score++;scoreEl.textContent=score;}
    else lockPiece();
    dropCounter=0; drawBoard();
  });

  onTap(document.getElementById('btn-drop'), ()=>{ if(state!=='playing')return; hardDrop(); });

  // キャンバス上スワイプ（ゲーム中のみ）
  let tx0,ty0,swipeDone=false;
  canvas.addEventListener('touchstart',e=>{
    tx0=e.touches[0].clientX; ty0=e.touches[0].clientY; swipeDone=false;
  },{passive:true});
  canvas.addEventListener('touchmove',e=>{
    if(state!=='playing'||swipeDone)return;
    const dx=e.touches[0].clientX-tx0, dy=e.touches[0].clientY-ty0;
    if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>18){
      if(dx>0){if(valid(piece,1,0))piece.x++;}
      else{if(valid(piece,-1,0))piece.x--;}
      tx0=e.touches[0].clientX; drawBoard();
    }else if(dy>32){
      hardDrop(); swipeDone=true;
    }
  },{passive:true});
  canvas.addEventListener('touchend',e=>{
    const dx=Math.abs(e.changedTouches[0].clientX-tx0);
    const dy=Math.abs(e.changedTouches[0].clientY-ty0);
    if(dx<10&&dy<10&&!swipeDone&&state==='playing'){doRotate();drawBoard();}
  },{passive:true});

  // キーボード
  document.addEventListener('keydown',e=>{
    if(state==='idle'||state==='over'){if(e.code==='Space'){e.preventDefault();startGame();}return;}
    if(e.code==='KeyP'){e.preventDefault();pauseGame();return;}
    if(state==='paused')return;
    switch(e.code){
      case'ArrowLeft': e.preventDefault(); if(valid(piece,-1,0))piece.x--; break;
      case'ArrowRight':e.preventDefault(); if(valid(piece,1,0))piece.x++;  break;
      case'ArrowDown': e.preventDefault();
        if(valid(piece,0,1)){piece.y++;score++;scoreEl.textContent=score;}
        else lockPiece(); dropCounter=0; break;
      case'ArrowUp':   e.preventDefault(); doRotate(); break;
      case'Space':     e.preventDefault(); hardDrop(); break;
    }
    drawBoard();
  });

  board=createBoard(); drawBoard();
})();
</script>
</body>
</html>

    </div>
    <button id="btn-pause">⏸</button>
  </div>
</div>

<div id="controls">
  <button class="ctrl-btn" id="btn-left">←</button>
  <button class="ctrl-btn" id="btn-rotate">↻</button>
  <button class="ctrl-btn" id="btn-right">→</button>
  <button class="ctrl-btn" id="btn-down">↓</button>
  <button class="ctrl-btn" id="btn-drop" style="grid-column:span 2;font-size:13px">ハードドロップ</button>
</div>

<script>
(function(){
  const COLS=10, ROWS=20;
  const canvas=document.getElementById('tetris');
  const ctx=canvas.getContext('2d');
  const nextCanvas=document.getElementById('next-canvas');
  const nctx=nextCanvas.getContext('2d');
  const overlay=document.getElementById('game-overlay');
  const overlayTitle=document.getElementById('overlay-title');
  const overlaySub=document.getElementById('overlay-sub');
  const btnOverlay=document.getElementById('btn-overlay');
  const scoreEl=document.getElementById('score-val');
  const levelEl=document.getElementById('level-val');
  const linesEl=document.getElementById('lines-val');
  const btnPause=document.getElementById('btn-pause');

  function calcCell(){
    const maxW=Math.min(window.innerWidth-100,240);
    return Math.floor(maxW/COLS);
  }
  let CELL=calcCell();
  function resizeCanvas(){
    CELL=calcCell();
    canvas.width=COLS*CELL;
    canvas.height=ROWS*CELL;
  }
  resizeCanvas();
  window.addEventListener('resize',()=>{resizeCanvas();drawBoard();});

  const PIECE_COLORS=[null,'#00cfcf','#cfcf00','#9f00cf','#00cf00','#cf0000','#0050cf','#cf6f00'];
  const SHAPES=[
    null,
    [[1,1,1,1]],
    [[2,2],[2,2]],
    [[0,3,0],[3,3,3]],
    [[0,4,4],[4,4,0]],
    [[5,5,0],[0,5,5]],
    [[6,0,0],[6,6,6]],
    [[0,0,7],[7,7,7]],
  ];

  let bag=[];
  function refillBag(){
    bag=[1,2,3,4,5,6,7];
    for(let i=bag.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [bag[i],bag[j]]=[bag[j],bag[i]];
    }
  }
  function nextFromBag(){
    if(!bag.length)refillBag();
    const id=bag.pop();
    const shape=SHAPES[id].map(r=>[...r]);
    return{id,shape,x:Math.floor((COLS-shape[0].length)/2),y:0};
  }

  let board,piece,nextPiece,score,level,lines,dropInterval,lastTime,rafId,dropCounter;
  let state='idle';

  const createBoard=()=>Array.from({length:ROWS},()=>new Array(COLS).fill(0));

  function rotate(shape){
    const rows=shape.length,cols=shape[0].length;
    const r=Array.from({length:cols},()=>new Array(rows).fill(0));
    for(let i=0;i<rows;i++)for(let j=0;j<cols;j++)r[j][rows-1-i]=shape[i][j];
    return r;
  }

  function valid(p,dx=0,dy=0,shape=p.shape){
    for(let r=0;r<shape.length;r++)
      for(let c=0;c<shape[r].length;c++)
        if(shape[r][c]){
          const nx=p.x+c+dx,ny=p.y+r+dy;
          if(nx<0||nx>=COLS||ny>=ROWS)return false;
          if(ny>=0&&board[ny][nx])return false;
        }
    return true;
  }

  function lockPiece(){
    piece.shape.forEach((row,r)=>row.forEach((v,c)=>{if(v&&piece.y+r>=0)board[piece.y+r][piece.x+c]=v;}));
    let cleared=0;
    for(let r=ROWS-1;r>=0;r--){
      if(board[r].every(v=>v)){board.splice(r,1);board.unshift(new Array(COLS).fill(0));cleared++;r++;}
    }
    if(cleared){
      const pts=[0,100,300,500,800];
      lines+=cleared;score+=(pts[cleared]||0)*level;
      level=Math.floor(lines/10)+1;
      dropInterval=Math.max(100,1000-(level-1)*90);
      scoreEl.textContent=score;levelEl.textContent=level;linesEl.textContent=lines;
    }
    piece=nextPiece;nextPiece=nextFromBag();
    if(!valid(piece)){gameOver();return;}
    drawNext();
  }

  function hardDrop(){
    while(valid(piece,0,1)){piece.y++;score+=2;}
    scoreEl.textContent=score;
    lockPiece();
  }

  function ghostY(){
    let gy=piece.y;
    while(valid(piece,0,gy-piece.y+1))gy++;
    return gy;
  }

  function drawCell(c,x,y,color,alpha=1){
    c.globalAlpha=alpha;
    c.fillStyle=color;
    c.fillRect(x*CELL+1,y*CELL+1,CELL-2,CELL-2);
    c.fillStyle='rgba(255,255,255,0.18)';
    c.fillRect(x*CELL+1,y*CELL+1,CELL-2,3);
    c.fillRect(x*CELL+1,y*CELL+1,3,CELL-2);
    c.fillStyle='rgba(0,0,0,0.3)';
    c.fillRect(x*CELL+1,y*CELL+CELL-4,CELL-2,3);
    c.fillRect(x*CELL+CELL-4,y*CELL+1,3,CELL-2);
    c.globalAlpha=1;
  }

  function drawBoard(){
    ctx.fillStyle='#0a0a14';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=0.5;
    for(let r=0;r<=ROWS;r++){ctx.beginPath();ctx.moveTo(0,r*CELL);ctx.lineTo(COLS*CELL,r*CELL);ctx.stroke();}
    for(let c=0;c<=COLS;c++){ctx.beginPath();ctx.moveTo(c*CELL,0);ctx.lineTo(c*CELL,ROWS*CELL);ctx.stroke();}
    board.forEach((row,r)=>row.forEach((v,c)=>{if(v)drawCell(ctx,c,r,PIECE_COLORS[v]);}));
    if(state==='playing'||state==='paused'){
      const gy=ghostY();
      piece.shape.forEach((row,r)=>row.forEach((v,c)=>{if(v&&gy+r>=0)drawCell(ctx,piece.x+c,gy+r,PIECE_COLORS[piece.id],0.22);}));
      piece.shape.forEach((row,r)=>row.forEach((v,c)=>{if(v&&piece.y+r>=0)drawCell(ctx,piece.x+c,piece.y+r,PIECE_COLORS[piece.id]);}));
    }
  }

  function drawNext(){
    nctx.fillStyle='#0a0a14';nctx.fillRect(0,0,60,60);
    const s=nextPiece.shape,nc=12;
    const ox=Math.floor((4-s[0].length)/2),oy=Math.floor((4-s.length)/2);
    s.forEach((row,r)=>row.forEach((v,c)=>{
      if(v){
        nctx.fillStyle=PIECE_COLORS[nextPiece.id];
        nctx.fillRect((ox+c)*nc+6+1,(oy+r)*nc+6+1,nc-2,nc-2);
        nctx.fillStyle='rgba(255,255,255,0.18)';
        nctx.fillRect((ox+c)*nc+6+1,(oy+r)*nc+6+1,nc-2,3);
        nctx.fillRect((ox+c)*nc+6+1,(oy+r)*nc+6+1,3,nc-2);
      }
    }));
  }

  function loop(ts=0){
    if(state!=='playing'){drawBoard();return;}
    const dt=ts-(lastTime||ts);lastTime=ts;
    dropCounter+=dt;
    if(dropCounter>=dropInterval){
      if(valid(piece,0,1))piece.y++;
      else lockPiece();
      dropCounter=0;
    }
    drawBoard();
    rafId=requestAnimationFrame(loop);
  }

  function startGame(){
    board=createBoard();score=0;level=1;lines=0;dropInterval=1000;dropCounter=0;lastTime=0;
    scoreEl.textContent=0;levelEl.textContent=1;linesEl.textContent=0;
    bag=[];refillBag();
    piece=nextFromBag();nextPiece=nextFromBag();
    drawNext();state='playing';
    overlay.classList.add('hidden');
    btnPause.textContent='⏸';
    cancelAnimationFrame(rafId);
    rafId=requestAnimationFrame(loop);
  }

  function pauseGame(){
    if(state==='playing'){
      state='paused';cancelAnimationFrame(rafId);
      overlay.classList.remove('hidden');
      overlayTitle.textContent='PAUSED';
      overlaySub.textContent='再開するには▶を押してください';
      btnOverlay.textContent='▶ 再開';
      btnPause.textContent='▶';
    }else if(state==='paused'){
      state='playing';overlay.classList.add('hidden');
      btnPause.textContent='⏸';lastTime=0;
      rafId=requestAnimationFrame(loop);
    }
  }

  function gameOver(){
    state='over';cancelAnimationFrame(rafId);
    overlay.classList.remove('hidden');
    overlayTitle.textContent='GAME OVER';
    overlaySub.textContent=`スコア: ${score}`;
    btnOverlay.textContent='▶ もう一度';
    drawBoard();
  }

  function doRotate(){
    const rotated=rotate(piece.shape);
    for(const dx of[0,1,-1,2,-2]){
      if(valid(piece,dx,0,rotated)){piece.shape=rotated;piece.x+=dx;break;}
    }
  }

  btnOverlay.addEventListener('click',()=>{
    if(state==='idle'||state==='over')startGame();
    else pauseGame();
  });
  btnPause.addEventListener('click',pauseGame);

  document.getElementById('btn-rotate').addEventListener('click',()=>{if(state!=='playing')return;doRotate();drawBoard();});
  document.getElementById('btn-left').addEventListener('click',()=>{if(state!=='playing')return;if(valid(piece,-1,0))piece.x--;drawBoard();});
  document.getElementById('btn-right').addEventListener('click',()=>{if(state!=='playing')return;if(valid(piece,1,0))piece.x++;drawBoard();});
  document.getElementById('btn-down').addEventListener('click',()=>{
    if(state!=='playing')return;
    if(valid(piece,0,1)){piece.y++;score++;scoreEl.textContent=score;}
    else lockPiece();
    dropCounter=0;drawBoard();
  });
  document.getElementById('btn-drop').addEventListener('click',()=>{if(state!=='playing')return;hardDrop();});

  function repeatBtn(id,action,delay=120){
    let timer;
    const el=document.getElementById(id);
    const start=()=>{action();timer=setInterval(action,delay);};
    const stop=()=>clearInterval(timer);
    el.addEventListener('pointerdown',start);
    el.addEventListener('pointerup',stop);
    el.addEventListener('pointerleave',stop);
  }
  repeatBtn('btn-left',()=>{if(state!=='playing')return;if(valid(piece,-1,0))piece.x--;drawBoard();});
  repeatBtn('btn-right',()=>{if(state!=='playing')return;if(valid(piece,1,0))piece.x++;drawBoard();});
  repeatBtn('btn-down',()=>{
    if(state!=='playing')return;
    if(valid(piece,0,1)){piece.y++;score++;scoreEl.textContent=score;}
    else lockPiece();
    dropCounter=0;drawBoard();
  });

  let tx0,ty0,swipeLock=false;
  canvas.addEventListener('touchstart',e=>{tx0=e.touches[0].clientX;ty0=e.touches[0].clientY;swipeLock=false;},{passive:true});
  canvas.addEventListener('touchmove',e=>{
    if(state!=='playing'||swipeLock)return;
    const dx=e.touches[0].clientX-tx0,dy=e.touches[0].clientY-ty0;
    if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>20){
      if(dx>0){if(valid(piece,1,0))piece.x++;}else{if(valid(piece,-1,0))piece.x--;}
      tx0=e.touches[0].clientX;swipeLock=false;drawBoard();
    }else if(dy>30){hardDrop();swipeLock=true;}
  },{passive:true});
  canvas.addEventListener('touchend',e=>{
    const dx=Math.abs(e.changedTouches[0].clientX-tx0),dy=Math.abs(e.changedTouches[0].clientY-ty0);
    if(dx<10&&dy<10&&state==='playing'){doRotate();drawBoard();}
  },{passive:true});

  document.addEventListener('keydown',e=>{
    if(state==='idle'||state==='over'){if(e.code==='Space'){e.preventDefault();startGame();}return;}
    if(e.code==='KeyP'){e.preventDefault();pauseGame();return;}
    if(state==='paused')return;
    switch(e.code){
      case'ArrowLeft':e.preventDefault();if(valid(piece,-1,0))piece.x--;break;
      case'ArrowRight':e.preventDefault();if(valid(piece,1,0))piece.x++;break;
      case'ArrowDown':e.preventDefault();
        if(valid(piece,0,1)){piece.y++;score++;scoreEl.textContent=score;}
        else lockPiece();dropCounter=0;break;
      case'ArrowUp':e.preventDefault();doRotate();break;
      case'Space':e.preventDefault();hardDrop();break;
    }
    drawBoard();
  });

  board=createBoard();drawBoard();
})();
</script>
</body>
</html>
